run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - revive
    - gofumpt

linters-settings:
  gofumpt:
    extra-rules: true
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: context-as-argument
        disabled: false
        exclude:
          - "**_test.go"
