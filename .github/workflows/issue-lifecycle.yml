name: Issue Lifecycle

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  update-tracker-on-close:
    name: Update Phase 3 tracker
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Update tracker checklist
        uses: actions/github-script@v7
        with:
          script: |
            const closedNumber = context.payload.issue.number;
            const trackerNumber = 216;

            // Skip if the tracker itself is being closed
            if (closedNumber === trackerNumber) return;

            try {
              const tracker = await github.rest.issues.get({
                ...context.repo,
                issue_number: trackerNumber,
              });

              let body = tracker.data.body;
              if (!body) return;

              // Check off the closed issue in the tracker
              const unchecked = `- [ ] #${closedNumber} `;
              const checked = `- [x] #${closedNumber} `;

              if (body.includes(unchecked)) {
                body = body.replace(unchecked, checked);

                // Update progress counter
                const total = (body.match(/- \[[ x]\] #\d+/g) || []).length;
                const done = (body.match(/- \[x\] #\d+/g) || []).length;
                body = body.replace(
                  /## Progress: \d+ \/ \d+ complete/,
                  `## Progress: ${done} / ${total} complete`
                );

                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: trackerNumber,
                  body,
                });

                core.info(`Checked off #${closedNumber} in tracker (${done}/${total})`);
              }
            } catch (e) {
              core.warning(`Could not update tracker: ${e.message}`);
            }

  close-issue-on-merge:
    name: Close linked issues on PR merge
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Auto-close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const branch = context.payload.pull_request.head.ref || '';

            // Extract issue numbers from "Closes #N" or "Fixes #N"
            const closePatterns = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issues = new Set();
            let match;
            while ((match = closePatterns.exec(body)) !== null) {
              issues.add(parseInt(match[1]));
            }

            // Also check branch name pattern: copilot/NNN-slug or agent/NNN-slug
            const branchMatch = branch.match(/(?:copilot|agent)\/(\d+)/);
            if (branchMatch) {
              issues.add(parseInt(branchMatch[1]));
            }

            for (const num of issues) {
              try {
                const issue = await github.rest.issues.get({
                  ...context.repo,
                  issue_number: num,
                });
                if (issue.data.state === 'open') {
                  await github.rest.issues.update({
                    ...context.repo,
                    issue_number: num,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  core.info(`Closed issue #${num}`);
                }
              } catch (e) {
                core.warning(`Could not close #${num}: ${e.message}`);
              }
            }
