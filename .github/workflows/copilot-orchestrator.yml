name: Copilot Orchestrator

# Handles the full PR lifecycle for Copilot-created PRs:
# 1. Copilot opens/readies a PR → enable auto-merge, post @copilot review request
# 2. Review submitted with changes requested → post @copilot to address comments
# 3. All checks pass + approved → auto-merge kicks in
# 4. PR merged → update tracker, notify for next assignment

on:
  pull_request:
    types: [opened, ready_for_review, closed]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ─── When Copilot opens or readies a PR ─────────────────────────────────
  on-pr-ready:
    name: Setup Copilot PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto --squash || true
          echo "Auto-merge enabled for PR #${{ github.event.pull_request.number }}"

      - name: Post review request comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Check if we already posted a review request
            const comments = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: pr.number,
              per_page: 20,
            });
            const alreadyRequested = comments.data.some(
              c => c.body.includes('<!-- copilot-orchestrator-review -->')
            );
            if (alreadyRequested) {
              core.info('Review already requested, skipping');
              return;
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr.number,
              body: [
                '<!-- copilot-orchestrator-review -->',
                `@copilot Please review this PR. Check for:`,
                '- Correctness against the linked issue requirements',
                '- Test coverage for new code',
                '- Error handling edge cases',
                '- Consistency with existing patterns in the codebase',
              ].join('\n'),
            });
            core.info(`Posted review request on PR #${pr.number}`);

  # ─── When a review requests changes ─────────────────────────────────────
  on-changes-requested:
    name: Address review comments
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      github.event.pull_request.user.login == 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to address comments
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const review = context.payload.review;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr.number,
              body: [
                `<!-- copilot-orchestrator-fix -->`,
                `@copilot Please address the review comments from the latest review.`,
                ``,
                `Review: ${review.html_url}`,
                ``,
                `Apply the requested changes and push a new commit.`,
              ].join('\n'),
            });
            core.info(`Asked Copilot to address review on PR #${pr.number}`);

  # ─── When a PR is merged → notify for next assignment ───────────────────
  on-merge:
    name: Post-merge actions
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Find next assignable issues
        id: next
        uses: actions/github-script@v7
        with:
          script: |
            // Get open Phase 3 issues with agent-ready label, sorted by number
            const issues = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'agent-ready,phase:3-core',
              per_page: 100,
              sort: 'created',
              direction: 'asc',
            });

            // Filter to unassigned issues (no Copilot assignee)
            const unassigned = issues.data.filter(
              i => !i.assignees.some(a => a.login === 'Copilot')
            );

            // Check dependencies: skip issues that reference open blockers
            const ready = [];
            for (const issue of unassigned) {
              const body = issue.body || '';
              const depMatches = body.match(/(?:blocked by|depends on)\s+#(\d+)/gi) || [];

              let blocked = false;
              for (const match of depMatches) {
                const depNum = parseInt(match.match(/#(\d+)/)[1]);
                try {
                  const dep = await github.rest.issues.get({
                    ...context.repo,
                    issue_number: depNum,
                  });
                  if (dep.data.state === 'open') {
                    blocked = true;
                    break;
                  }
                } catch (e) {
                  // If we can't find the dep, assume it's ok
                }
              }

              if (!blocked) {
                ready.push(issue);
              }
              if (ready.length >= 4) break; // Suggest up to 4 candidates
            }

            if (ready.length === 0) {
              core.info('No unblocked issues found');
              core.setOutput('found', 'false');
              return;
            }

            core.setOutput('found', 'true');

            // Format the suggestion
            const suggestions = ready.slice(0, 4).map(i => {
              const labels = i.labels.map(l => l.name);
              const size = labels.find(l => l.startsWith('size:')) || 'size:?';
              const ws = labels.find(l => l.startsWith('ws:')) || '';
              const priority = labels.find(l => l.startsWith('priority:')) || '';
              return `| #${i.number} | ${i.title} | ${size.replace('size:', '')} | ${priority.replace('priority:', '')} | ${ws.replace('ws:', '')} |`;
            });

            const body = [
              `## Ready for next Copilot assignment`,
              ``,
              `PR #${context.payload.pull_request.number} has been merged. The following issues are unblocked and ready:`,
              ``,
              `| Issue | Title | Size | Priority | Workstream |`,
              `|-------|-------|------|----------|------------|`,
              ...suggestions,
              ``,
              `**To assign:** Open each issue in GitHub and assign Copilot with your preferred model.`,
              ``,
              `> Recommended: assign 2 issues at a time for parallel progress.`,
            ].join('\n');

            core.setOutput('body', body);

      - name: Post next-assignment notification
        if: steps.next.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Post on the tracker issue #216
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: 216,
              body: ${{ toJSON(steps.next.outputs.body) }},
            });

      - name: Update project board status
        if: steps.next.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          # Get the merged PR's linked issue number from branch name
          BRANCH="${{ github.event.pull_request.head.ref }}"
          ISSUE_NUM=$(echo "$BRANCH" | grep -oP '(?:copilot|agent)/\K\d+' || echo "")

          if [ -n "$ISSUE_NUM" ]; then
            echo "Merged PR for issue #$ISSUE_NUM"
            # The issue-lifecycle workflow handles closing the issue
            # and checking it off in the tracker
          fi
