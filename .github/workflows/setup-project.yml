name: Setup GitHub Project Board

# Run manually once to create the "Trading Agent Implementation" project,
# add all custom fields, configure Status options, and create the views.
# Requires a Personal Access Token with the `project` scope stored as
# the repository secret PROJECT_PAT.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-project:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      PROJECT_TITLE: Trading Agent Implementation
    steps:
      - name: Get or create project
        id: project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          EXISTING_NUM=$(gh project list --owner "$OWNER" --format json \
            | jq -r --arg t "$PROJECT_TITLE" \
              '.projects[] | select(.title == $t) | .number' \
            | head -1)
          if [ -n "$EXISTING_NUM" ]; then
            echo "Project '$PROJECT_TITLE' already exists as #$EXISTING_NUM"
            echo "number=$EXISTING_NUM" >> "$GITHUB_OUTPUT"
          else
            NUM=$(gh project create \
              --owner "$OWNER" \
              --title "$PROJECT_TITLE" \
              --format json | jq '.number')
            echo "Created project #$NUM"
            echo "number=$NUM" >> "$GITHUB_OUTPUT"
          fi

      - name: Get project node ID
        id: project_node
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          NODE_ID=$(gh project view "${{ steps.project.outputs.number }}" \
            --owner "$OWNER" --format json | jq -r '.id')
          echo "node_id=$NODE_ID" >> "$GITHUB_OUTPUT"

      - name: Create custom fields
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          NUM="${{ steps.project.outputs.number }}"
          EXISTING=$(gh project field-list "$NUM" --owner "$OWNER" --format json \
            | jq -r '.fields[].name')

          has_field() { echo "$EXISTING" | grep -qxF "$1"; }

          # Priority — maps to priority:p0/p1/p2/p3 labels
          has_field "Priority" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Priority" --data-type SINGLE_SELECT \
            --single-select-options "P0,P1,P2,P3"

          # Workstream — maps to ws:* labels
          WORKSTREAM_OPTIONS=(
            project-foundation repo-scaffolding architecture
            config-env llm-provider analysis-agents
            data-ingestion agent-orchestration research-debate
            trading-agent risk-debate risk-engine memory-learning
            market-adapters execution-engine backtesting
            paper-trading api-layer websocket-realtime frontend
            cli-tui observability security infra-deploy
            testing-qa strategy-engine docs-devex database-persistence
          )
          WORKSTREAMS=$(IFS=,; echo "${WORKSTREAM_OPTIONS[*]}")
          has_field "Workstream" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Workstream" --data-type SINGLE_SELECT \
            --single-select-options "$WORKSTREAMS"

          # Phase — maps to phase:0–phase:6 labels
          has_field "Phase" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Phase" --data-type SINGLE_SELECT \
            --single-select-options "0,1,2,3,4,5,6"

          # Size — maps to size:xs/s/m/l/xl labels
          has_field "Size" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Size" --data-type SINGLE_SELECT \
            --single-select-options "XS,S,M,L,XL"

          # Type — maps to type:* labels
          has_field "Type" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Type" --data-type SINGLE_SELECT \
            --single-select-options "Epic,Feature,Infra,Docs,Testing,Security,Decision,DevEx,Observability"

          # Risk Level — maps to risk:low/medium/high labels
          has_field "Risk Level" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Risk Level" --data-type SINGLE_SELECT \
            --single-select-options "Low,Medium,High"

          # Agent-ready — maps to workflow:agent-ready label
          has_field "Agent-ready" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Agent-ready" --data-type SINGLE_SELECT \
            --single-select-options "Yes,No"

          # Blocked — maps to workflow:blocked label
          has_field "Blocked" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Blocked" --data-type SINGLE_SELECT \
            --single-select-options "Yes,No"

          # Depends on — free-text reference to blocking issue numbers
          has_field "Depends on" || gh project field-create "$NUM" \
            --owner "$OWNER" --name "Depends on" --data-type TEXT

      - name: Configure Status field options
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          PROJECT_ID="${{ steps.project_node.outputs.node_id }}"

          STATUS_FIELD_ID=$(gh api graphql \
            -f query='query($id:ID!){node(id:$id){...on ProjectV2{fields(first:20){nodes{...on ProjectV2SingleSelectField{id name}}}}}}' \
            -f id="$PROJECT_ID" \
            | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')

          # Replace Status options with the required set.
          # This uses the GitHub GraphQL API because gh-cli does not expose
          # field-option management for built-in fields.
          gh api graphql -f query='
            mutation($pid:ID!,$fid:ID!){
              updateProjectV2Field(input:{
                projectId:$pid
                fieldId:$fid
                singleSelectOptions:[
                  {name:"Backlog",     color:GRAY,   description:"Not yet ready to start"},
                  {name:"Ready",       color:BLUE,   description:"Ready to be picked up"},
                  {name:"In Progress", color:YELLOW, description:"Actively being worked on"},
                  {name:"Blocked",     color:RED,    description:"Blocked by an unresolved dependency"},
                  {name:"In Review",   color:PURPLE, description:"Under review or waiting for approval"},
                  {name:"Done",        color:GREEN,  description:"Completed and merged"}
                ]
              }){
                projectV2Field{...on ProjectV2SingleSelectField{options{name}}}
              }
            }' \
            -f pid="$PROJECT_ID" \
            -f fid="$STATUS_FIELD_ID"

      - name: Create views
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          PROJECT_ID="${{ steps.project_node.outputs.node_id }}"

          EXISTING_VIEWS=$(gh api graphql \
            -f query='query($id:ID!){node(id:$id){...on ProjectV2{views(first:20){nodes{name}}}}}' \
            -f id="$PROJECT_ID" \
            | jq -r '.data.node.views.nodes[].name')

          create_view() {
            local name="$1" layout="$2"
            if echo "$EXISTING_VIEWS" | grep -qxF "$name"; then
              echo "View '$name' already exists — skipping"
              return
            fi
            gh api graphql -f query='
              mutation($pid:ID!,$name:String!,$layout:ProjectV2ViewLayout!){
                createProjectV2View(input:{projectId:$pid,name:$name,layout:$layout}){
                  projectV2View{id name}
                }
              }' \
              -f pid="$PROJECT_ID" -f name="$name" -f layout="$layout"
            echo "Created view: $name ($layout)"
          }

          # TABLE_LAYOUT = spreadsheet/filter view; BOARD_LAYOUT = kanban columns
          create_view "Backlog"          TABLE_LAYOUT
          create_view "By Workstream"    BOARD_LAYOUT
          create_view "By Phase"         TABLE_LAYOUT
          create_view "By Priority"      TABLE_LAYOUT
          create_view "Agent-ready only" TABLE_LAYOUT
          create_view "Decision issues"  TABLE_LAYOUT
          create_view "Foundation-first" TABLE_LAYOUT
