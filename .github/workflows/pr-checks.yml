name: PR Hygiene

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-linked-issue:
    name: Verify linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Check PR has a linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';
            const branch = context.payload.pull_request.head.ref || '';

            // Check for issue references in body, title, or branch
            const patterns = [
              /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi,
              /#(\d+)/g,
              /\/(\d+)[-_]/,
            ];

            let found = false;
            for (const p of patterns) {
              if (p.test(body) || p.test(title) || p.test(branch)) {
                found = true;
                break;
              }
            }

            if (!found) {
              core.warning('PR does not reference an issue number. Consider linking one with "Closes #N" in the description.');
            }

  check-pr-size:
    name: PR size check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changes = pr.additions + pr.deletions;

            if (changes > 1000) {
              core.warning(`Large PR: ${changes} lines changed. Consider splitting into smaller PRs.`);
            }

            // Label by size
            let sizeLabel;
            if (changes < 50) sizeLabel = 'size:xs';
            else if (changes < 200) sizeLabel = 'size:s';
            else if (changes < 500) sizeLabel = 'size:m';
            else if (changes < 1000) sizeLabel = 'size:l';
            else sizeLabel = 'size:xl';

            try {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: pr.number,
                labels: [sizeLabel],
              });
            } catch (e) {
              core.info(`Could not add label: ${e.message}`);
            }
