version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - type:infra
      - priority:p2-normal
    commit-message:
      prefix: "deps(go):"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - type:infra
      - priority:p2-normal
    commit-message:
      prefix: "deps(npm):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - type:infra
      - priority:p2-normal
    commit-message:
      prefix: "deps(actions):"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - type:infra
      - priority:p2-normal
    commit-message:
      prefix: "deps(docker):"
